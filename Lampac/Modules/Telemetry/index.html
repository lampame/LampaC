<!doctype html>
<html lang="ru" data-theme="dark">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0c0e12" id="metaTheme" />
        <title>Telemetry — Lampac</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --font-body: "Inter", system-ui, -apple-system, sans-serif;
                --font-mono:
                    "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas,
                    monospace;
                --text-xs: 0.6875rem;
                --text-sm: 0.8125rem;
                --text-base: 0.875rem;
                --text-lg: 1rem;
                --text-xl: 1.25rem;
                --sp-1: 0.25rem;
                --sp-2: 0.5rem;
                --sp-3: 0.75rem;
                --sp-4: 1rem;
                --sp-5: 1.25rem;
                --sp-6: 1.5rem;
                --sp-8: 2rem;
                --r-sm: 6px;
                --r-md: 8px;
                --r-lg: 12px;
                --r-xl: 16px;
                --ease: cubic-bezier(0.16, 1, 0.3, 1);
                --dur: 180ms;
            }

            [data-theme="dark"] {
                --bg: #0c0e12;
                --surface: #13161d;
                --surface-2: #1a1e28;
                --surface-3: #222733;
                --border: #2a3040;
                --border-subtle: rgba(255, 255, 255, 0.06);
                --text: #e2e6ef;
                --text-muted: #7c849a;
                --text-faint: #4d5568;
                --accent: #3ec9d1;
                --accent-soft: #2ea8b0;
                --accent-dim: rgba(62, 201, 209, 0.12);
                --accent-hover: rgba(62, 201, 209, 0.22);
                --ok: #4ade80;
                --ok-dim: rgba(74, 222, 128, 0.12);
                --err: #f87171;
                --err-dim: rgba(248, 113, 113, 0.12);
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
                --overlay: rgba(0, 0, 0, 0.6);
            }

            [data-theme="light"] {
                --bg: #f4f5f8;
                --surface: #ffffff;
                --surface-2: #f0f1f5;
                --surface-3: #e8eaf0;
                --border: #d4d8e3;
                --border-subtle: rgba(0, 0, 0, 0.06);
                --text: #1a1e28;
                --text-muted: #6b7280;
                --text-faint: #9ca3af;
                --accent: #0d9499;
                --accent-soft: #0b7d82;
                --accent-dim: rgba(13, 148, 153, 0.1);
                --accent-hover: rgba(13, 148, 153, 0.18);
                --ok: #16a34a;
                --ok-dim: rgba(22, 163, 74, 0.1);
                --err: #dc2626;
                --err-dim: rgba(220, 38, 38, 0.1);
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
                --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
                --overlay: rgba(0, 0, 0, 0.3);
            }

            html,
            body {
                height: 100%;
            }
            body {
                font-family: var(--font-body);
                font-size: var(--text-base);
                color: var(--text);
                background: var(--bg);
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }
            .app {
                display: flex;
                flex-direction: column;
                min-height: 100dvh;
            }
            .app-chrome {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                flex-shrink: 0;
                z-index: 35;
                background: var(--surface);
            }

            .topbar {
                display: flex;
                align-items: center;
                gap: var(--sp-4);
                padding: var(--sp-3) var(--sp-6);
                min-height: 52px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                z-index: 30;
                flex-shrink: 0;
                flex-wrap: wrap;
            }
            .topbar-logo {
                display: flex;
                align-items: center;
                gap: var(--sp-2);
                font-weight: 700;
                font-size: var(--text-lg);
                letter-spacing: -0.02em;
                color: var(--text);
                flex-shrink: 0;
                white-space: nowrap;
            }
            .topbar-logo span {
                font-weight: 400;
                color: var(--text-muted);
                margin-left: 2px;
            }
            .topbar-divider {
                width: 1px;
                height: 24px;
                background: var(--border);
                flex-shrink: 0;
            }
            .topbar-app-nav {
                display: flex;
                align-items: center;
                gap: var(--sp-2);
                flex-shrink: 0;
            }
            .topbar-app-nav a {
                font: inherit;
                font-size: var(--text-xs);
                font-weight: 600;
                padding: 6px 12px;
                border-radius: var(--r-md);
                border: 1px solid var(--border);
                background: var(--surface-2);
                color: var(--text-muted);
                text-decoration: none;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 34px;
                min-width: 5.75rem;
                box-sizing: border-box;
                transition: all var(--dur) var(--ease);
            }
            .topbar-app-nav a:hover {
                color: var(--text);
                background: var(--surface-3);
            }
            .topbar-app-nav a[aria-current="page"] {
                background: var(--surface);
                color: var(--accent);
                border-color: var(--accent);
                box-shadow: var(--shadow-sm);
            }
            .topbar-spacer {
                flex: 1;
                min-width: var(--sp-2);
            }
            .topbar-actions {
                display: flex;
                align-items: center;
                gap: var(--sp-2);
                flex-shrink: 0;
            }

            .btn {
                font: inherit;
                font-size: var(--text-xs);
                font-weight: 600;
                padding: 6px 14px;
                border-radius: var(--r-md);
                border: 1px solid var(--accent);
                background: var(--accent-dim);
                color: var(--accent);
                cursor: pointer;
                transition: all var(--dur) var(--ease);
                display: inline-flex;
                align-items: center;
                gap: var(--sp-2);
                white-space: nowrap;
                min-height: 34px;
            }
            .btn-icon {
                width: 34px;
                height: 34px;
                min-width: 34px;
                padding: 0;
                justify-content: center;
                border-color: var(--border);
                background: var(--surface-2);
                color: var(--text-muted);
            }
            .btn:hover {
                background: var(--accent-hover);
                transform: translateY(-1px);
                box-shadow: var(--shadow-sm);
            }
            .btn-icon:hover {
                color: var(--text);
                background: var(--surface-3);
            }
            .btn-primary {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .btn-primary:hover {
                background: var(--accent-soft);
                border-color: var(--accent-soft);
            }
            .btn-danger {
                background: var(--err-dim);
                color: var(--err);
                border-color: var(--err);
            }
            .btn-danger:hover {
                background: rgba(248, 113, 113, 0.2);
            }

            .main {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                padding: var(--sp-4) var(--sp-6) var(--sp-8);
                display: flex;
                flex-direction: column;
                gap: var(--sp-4);
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: var(--sp-4);
            }
            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--r-lg);
                padding: var(--sp-4);
                box-shadow: var(--shadow-sm);
                display: flex;
                flex-direction: column;
                gap: var(--sp-2);
            }
            .card-title {
                font-size: var(--text-xs);
                font-weight: 600;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .card-value {
                font-size: var(--text-xl);
                font-weight: 700;
                color: var(--text);
            }

            .chart-container {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--r-lg);
                padding: var(--sp-4);
                box-shadow: var(--shadow-sm);
                height: 350px;
            }
            .table-container {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--r-lg);
                box-shadow: var(--shadow-sm);
                overflow: hidden;
                overflow-x: auto;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
            }
            th {
                font-size: var(--text-xs);
                font-weight: 600;
                color: var(--text-muted);
                padding: var(--sp-3) var(--sp-4);
                border-bottom: 1px solid var(--border);
                background: var(--surface-2);
                white-space: nowrap;
            }
            td {
                font-size: var(--text-sm);
                padding: var(--sp-3) var(--sp-4);
                border-bottom: 1px solid var(--border-subtle);
                color: var(--text);
            }
            tr:last-child td {
                border-bottom: none;
            }
            tr:hover td {
                background: var(--surface-2);
            }

            .badge {
                display: inline-flex;
                align-items: center;
                padding: 2px 6px;
                border-radius: var(--r-sm);
                font-size: var(--text-xs);
                font-weight: 600;
                font-family: var(--font-mono);
                background: var(--surface-3);
                color: var(--text-faint);
            }
            .badge.success {
                background: var(--ok-dim);
                color: var(--ok);
                border: 1px solid rgba(74, 222, 128, 0.2);
            }
            .badge.error {
                background: var(--err-dim);
                color: var(--err);
                border: 1px solid rgba(248, 113, 113, 0.2);
            }

            .filter-bar {
                display: flex;
                gap: var(--sp-2);
                align-items: center;
                flex-wrap: wrap;
                background: var(--surface);
                padding: var(--sp-3);
                border-radius: var(--r-lg);
                border: 1px solid var(--border);
            }
            .input {
                font-family: var(--font-mono);
                font-size: var(--text-sm);
                padding: 6px 12px;
                border-radius: var(--r-md);
                border: 1px solid var(--border);
                background: var(--surface-2);
                color: var(--text);
                outline: none;
                transition: all var(--dur) var(--ease);
                min-width: 150px;
                height: 34px;
            }
            .input:focus {
                border-color: var(--accent);
                background: var(--surface);
            }

            /* Modals */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: var(--overlay);
                z-index: 100;
                display: none;
                align-items: center;
                justify-content: center;
                backdrop-filter: blur(2px);
            }
            .modal {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--r-lg);
                width: 100%;
                max-width: 500px;
                max-height: 90vh;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                box-shadow: var(--shadow-md);
            }
            .modal-header {
                padding: var(--sp-4);
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-weight: 600;
                font-size: var(--text-lg);
            }
            .modal-body {
                padding: var(--sp-4);
                display: flex;
                flex-direction: column;
                gap: var(--sp-3);
            }
            .modal-footer {
                padding: var(--sp-4);
                border-top: 1px solid var(--border);
                display: flex;
                justify-content: flex-end;
                gap: var(--sp-2);
            }

            .form-group {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .form-group label {
                font-size: var(--text-xs);
                color: var(--text-muted);
                font-weight: 600;
            }
            .form-group textarea,
            .form-group input {
                font-family: var(--font-mono);
                font-size: var(--text-sm);
                padding: 8px;
                border-radius: var(--r-md);
                border: 1px solid var(--border);
                background: var(--surface-2);
                color: var(--text);
                outline: none;
                resize: vertical;
                min-height: 60px;
            }
            .form-group textarea:focus,
            .form-group input:focus {
                border-color: var(--accent);
            }

            .clickable {
                cursor: pointer;
                color: var(--accent);
                text-decoration: underline;
                text-decoration-color: var(--accent-dim);
                text-underline-offset: 3px;
            }
            .clickable:hover {
                color: var(--accent-soft);
            }
        </style>
    </head>
    <body>
        <div class="app">
            <div class="app-chrome">
                <div class="topbar">
                    <div class="topbar-logo">
                        <svg
                            width="28"
                            height="28"
                            viewBox="0 0 28 28"
                            fill="none"
                            aria-hidden="true"
                        >
                            <rect
                                x="2"
                                y="2"
                                width="24"
                                height="24"
                                rx="6"
                                stroke="currentColor"
                                stroke-width="1.5"
                                fill="none"
                            />
                            <rect
                                x="7"
                                y="16"
                                width="3"
                                height="6"
                                rx="1"
                                fill="var(--accent)"
                            />
                            <rect
                                x="12.5"
                                y="11"
                                width="3"
                                height="11"
                                rx="1"
                                fill="var(--accent)"
                                opacity="0.7"
                            />
                            <rect
                                x="18"
                                y="6"
                                width="3"
                                height="16"
                                rx="1"
                                fill="var(--accent)"
                                opacity="0.45"
                            />
                        </svg>
                        Lampac <span>Telemetry</span>
                    </div>
                    <div class="topbar-divider"></div>
                    <div class="topbar-app-nav">
                        <a href="/adminpanel">Admin</a>
                        <a href="/stats">Stats</a>
                        <a href="/weblog">Weblog</a>
                        <a href="/telemetry" aria-current="page">Telemetry</a>
                    </div>
                    <div class="topbar-spacer"></div>
                    <div class="topbar-actions">
                        <button
                            class="btn btn-icon"
                            id="themeToggle"
                            title="Переключить тему"
                        >
                            <svg
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                                ></path>
                            </svg>
                        </button>
                        <button
                            class="btn btn-icon"
                            id="safeModeToggle"
                            title="Безопасный режим (Скрыть IP и UID)"
                        >
                            <svg
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                id="safeModeIcon"
                            >
                                <rect
                                    x="3"
                                    y="11"
                                    width="18"
                                    height="11"
                                    rx="2"
                                    ry="2"
                                ></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </button>
                        <button class="btn" onclick="openSettings()">
                            Настройки
                        </button>
                        <button
                            class="btn btn-primary"
                            onclick="exportDataJson()"
                        >
                            Экспорт JSON
                        </button>
                    </div>
                </div>
            </div>

            <div class="main">
                <div class="grid">
                    <div class="card">
                        <div class="card-title">Запросов сегодня</div>
                        <div class="card-value" id="valToday">-</div>
                    </div>
                    <div class="card">
                        <div class="card-title">Запросов за период</div>
                        <div class="card-value" id="valMonth">-</div>
                    </div>
                    <div class="card">
                        <div class="card-title">Уникальных IP</div>
                        <div class="card-value" id="valIp">-</div>
                    </div>
                    <div class="card">
                        <div class="card-title">Уникальных устройств</div>
                        <div class="card-value" id="valUa">-</div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="trafficChart"></canvas>
                </div>

                <div
                    class="grid"
                    style="
                        grid-template-columns: repeat(
                            auto-fit,
                            minmax(300px, 1fr)
                        );
                    "
                >
                    <div class="chart-container" style="position: relative">
                        <canvas id="balancersChart"></canvas>
                        <div
                            id="balancersEmpty"
                            style="
                                display: none;
                                position: absolute;
                                inset: 0;
                                justify-content: center;
                                align-items: center;
                                color: var(--text-faint);
                            "
                        >
                            Нет данных
                        </div>
                    </div>
                    <div class="chart-container" style="position: relative">
                        <canvas id="adultChart"></canvas>
                        <div
                            id="adultEmpty"
                            style="
                                display: none;
                                position: absolute;
                                inset: 0;
                                justify-content: center;
                                align-items: center;
                                color: var(--text-faint);
                            "
                        >
                            Нет данных
                        </div>
                    </div>
                    <div class="chart-container" style="position: relative">
                        <canvas id="usersChart"></canvas>
                        <div
                            id="usersEmpty"
                            style="
                                display: none;
                                position: absolute;
                                inset: 0;
                                justify-content: center;
                                align-items: center;
                                color: var(--text-faint);
                            "
                        >
                            Нет данных
                        </div>
                    </div>
                </div>

                <div
                    class="chart-container"
                    style="
                        position: relative;
                        margin-top: 1.5rem;
                        min-height: 350px;
                    "
                >
                    <canvas id="moviesChart"></canvas>
                    <div
                        id="moviesEmpty"
                        style="
                            display: none;
                            position: absolute;
                            inset: 0;
                            justify-content: center;
                            align-items: center;
                            color: var(--text-faint);
                        "
                    >
                        Нет данных
                    </div>
                </div>

                <div
                    class="grid"
                    style="
                        grid-template-columns: repeat(
                            auto-fit,
                            minmax(300px, 1fr)
                        );
                        gap: 1.5rem;
                        margin-top: 1.5rem;
                    "
                >
                    <div
                        class="chart-container"
                        style="position: relative; min-height: 350px"
                    >
                        <canvas id="devicesChart"></canvas>
                        <div
                            id="devicesEmpty"
                            style="
                                display: none;
                                position: absolute;
                                inset: 0;
                                justify-content: center;
                                align-items: center;
                                color: var(--text-faint);
                            "
                        >
                            Нет данных
                        </div>
                    </div>
                    <div
                        class="chart-container"
                        style="position: relative; min-height: 350px"
                    >
                        <canvas id="hoursChart"></canvas>
                        <div
                            id="hoursEmpty"
                            style="
                                display: none;
                                position: absolute;
                                inset: 0;
                                justify-content: center;
                                align-items: center;
                                color: var(--text-faint);
                            "
                        >
                            Нет данных
                        </div>
                    </div>
                    <div
                        class="chart-container"
                        style="position: relative; min-height: 350px"
                    >
                        <canvas id="contentTypesChart"></canvas>
                        <div
                            id="contentTypesEmpty"
                            style="
                                display: none;
                                position: absolute;
                                inset: 0;
                                justify-content: center;
                                align-items: center;
                                color: var(--text-faint);
                            "
                        >
                            Нет данных
                        </div>
                    </div>
                </div>

                <div class="filter-bar">
                    <select
                        id="periodSelect"
                        class="input"
                        style="min-width: 140px"
                        onchange="refreshAll()"
                    >
                        <option value="0">Сегодня</option>
                        <option value="-1">Вчера</option>
                        <option value="7">Неделя</option>
                        <option value="30" selected>Месяц</option>
                        <option value="90">3 месяца</option>
                    </select>
                    <div
                        style="
                            width: 1px;
                            height: 24px;
                            background: var(--border);
                            margin: 0 var(--sp-2);
                        "
                    ></div>
                    <input
                        type="text"
                        id="searchQuery"
                        class="input"
                        style="flex: 1"
                        placeholder="Глобальный поиск (UID, IP, URL, Балансир...)"
                        onkeydown="if (event.key === 'Enter') refreshAll();"
                    />
                    <button class="btn btn-primary" onclick="refreshAll()">
                        Найти
                    </button>
                    <button
                        class="btn btn-danger"
                        style="margin-left: auto"
                        onclick="deleteFilteredLogs()"
                    >
                        Массовое удаление
                    </button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Время</th>
                                <th>UID</th>
                                <th>IP</th>
                                <th>Путь</th>
                                <th>Балансир</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody id="logsBody">
                            <tr>
                                <td
                                    colspan="6"
                                    style="text-align: center; padding: 2rem"
                                >
                                    Загрузка...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <div class="modal-header">
                    Настройки фильтрации
                    <button
                        class="btn btn-icon"
                        onclick="closeModal('settingsModal')"
                    >
                        ✕
                    </button>
                </div>
                <div class="modal-body">

            function escapeHtml(str) {
                if (!str) return str;
                return String(str)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");

            }

                }

                let labels = timeline.map((t) => {
                    const d = new Date(t.date);
                    return d.getHours() === 0 && d.getMinutes() === 0
                        ? d.toLocaleDateString()
                        : d.toLocaleTimeString([], {
                              hour: "2-digit",
                              minute: "2-digit",
                          });
                });

                modalChartInstance = new Chart(
                    document.getElementById("modalChart").getContext("2d"),
                    {
                        type: "line",
                        data: {

            async function loadLogs() {
                const days = document.getElementById("periodSelect").value;
                const search = document.getElementById("searchQuery").value;
                let url = `/telemetry/api/logs?take=100&days=${days}`;
                if (search) url += "&search=" + encodeURIComponent(search);

                try {
                    const res = await fetch(url);
                    const json = await res.json();
                    const tbody = document.getElementById("logsBody");
                    tbody.innerHTML = "";

                    if (json.success && json.data.length > 0) {
                        json.data.forEach((log) => {
                            const tr = document.createElement("tr");
                            const d = new Date(log.time);
                            const time =
                                d.toLocaleDateString() +
                                " " +
                                d.toLocaleTimeString();
                            const statusClass =
                                log.statusCode >= 400
                                    ? "error"
                                    : log.statusCode > 0
                                      ? "success"
                                      : "";
                            const statusBadge = log.statusCode
                                ? `<span class="badge ${statusClass}">${log.statusCode}</span>`
                                : "-";

                            tr.innerHTML = `
              <td style="font-family: var(--font-mono); color: var(--text-muted); font-size: var(--text-xs);">${time}</td>
              <td style="font-family: var(--font-mono); font-size: var(--text-xs);"><span class="${log.uid !== "anonymous" ? "clickable" : ""}" onclick="showUser('${escapeAttr(log.uid)}')">${censorUid(escapeHtml(log.uid)) || "-"}</span></td>
              <td style="font-family: var(--font-mono); font-size: var(--text-xs);">
                 <span class="clickable" onclick="showIp('${escapeAttr(log.ip)}')">${censorIp(log.ip)}</span>
              </td>
              <td style="word-break: break-all; max-width: 300px; font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted);">${escapeHtml(log.uri)}</td>
              <td style="font-family: var(--font-mono); font-size: var(--text-xs);"><span class="${log.balancer ? "clickable" : ""}" onclick="showBalancer('${escapeAttr(log.balancer || "")}')">${log.balancer ? escapeHtml(getBalancerName(log.balancer)) : "-"}</span></td>
              <td>${statusBadge}</td>
            `;
                            tbody.appendChild(tr);
                        });
                    } else {
                        tbody.innerHTML =
                            '<tr><td colspan="6" style="text-align:center; padding: 2rem; color: var(--text-faint);">Ничего не найдено</td></tr>';
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            async function deleteFilteredLogs() {
                const search = document.getElementById("searchQuery").value;

                if (!search) {
                    if (
                        !confirm(
                            `Вы не ввели поисковый запрос! Это удалит ВСЕ логи за все время. Вы уверены?`,
                        )
                    )
                        return;
                } else {
                    if (
                        !confirm(
                            `Удалить все логи для фильтра: "${search}"? Это действие нельзя отменить.`,
                        )
                    )
                        return;
                }

                const fd = new FormData();
                if (search) fd.append("search", search);
                fd.append(
                    "days",
                    document.getElementById("periodSelect").value,
                );

                try {
                    const res = await fetch("/telemetry/api/logs/delete", {
                        method: "POST",
                        body: fd,
                    });
                    const json = await res.json();
                    if (json.success) {
                        alert(`Удалено записей: ${json.deleted}`);
                        loadLogs();
                        loadStats();
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            async function exportDataJson() {
                try {
                    const res = await fetch("/telemetry/api/export");
                    const json = await res.json();
                    const exportData = json.map((log) => ({
                        ...log,
                        uid: censorUid(log.uid),
                        ip: censorIp(log.ip),
                    }));
                    const dataStr =
                        "data:text/json;charset=utf-8," +
                        encodeURIComponent(JSON.stringify(exportData, null, 2));
                    const downloadAnchorNode = document.createElement("a");
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute(
                        "download",
                        "telemetry_export.json",
                    );
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                } catch (e) {
                    console.error(e);
                }
            }

                const hoverScript = `onmouseover="this.style.transform='scale(1.15) translateY(-2px)'" onmouseout="this.style.transform='scale(1) translateY(0)'"`;

                if (item.tmdb && item.tmdb !== "0") {

                    html += `<a href="${tmdbUrl}" target="_blank" style="${linkStyle}" ${hoverScript}>${tmdbIcon}</a>`;

                }
                if (item.imdb && item.imdb !== "0") {
                    html += `<a href="https://www.imdb.com/title/${item.imdb}/" target="_blank" style="${linkStyle}" ${hoverScript}>${imdbIcon}</a>`;
                }
                html += `<a href="https://www.google.com/search?q=${encodeURIComponent(title)}" target="_blank" style="${linkStyle}" ${hoverScript}>${googleIcon}</a>`;

                document.getElementById("linksContent").innerHTML = html;
                document.getElementById("linksModal").style.display = "flex";
            };

            async function openSettings() {
                try {
                    const res = await fetch("/telemetry/api/settings");
                    const json = await res.json();
                    if (json.success) {
                        document.getElementById("setPrefixes").value =
                            json.data.prefixes;
                        document.getElementById("setExtensions").value =
                            json.data.extensions;
                        document.getElementById("setRegexes").value =
                            json.data.regexes;
                        document.getElementById("setIps").value = json.data.ips;
                        document.getElementById("setRateLimit").value =
                            json.data.rateLimit;
                        document.getElementById("settingsModal").style.display =
                            "flex";
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            async function saveSettings() {
                const fd = new FormData();
                fd.append(
                    "prefixes",
                    document.getElementById("setPrefixes").value,
                );
                fd.append(
                    "extensions",
                    document.getElementById("setExtensions").value,
                );
                fd.append(
                    "regexes",
                    document.getElementById("setRegexes").value,
                );
                fd.append("ips", document.getElementById("setIps").value);
                fd.append(
                    "rateLimit",
                    document.getElementById("setRateLimit").value,
                );

                try {
                    const res = await fetch("/telemetry/api/settings", {
                        method: "POST",
                        body: fd,
                    });
                    const json = await res.json();
                    if (json.success) {
                        closeModal("settingsModal");
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            function refreshAll() {
                loadStats();
                loadChart();
                loadTops();
                loadLogs();
            }

            refreshAll();
            setInterval(refreshAll, 60000);
        </script>
    </body>
</html>
