enable: true
displayindex: 411
displayname: FamilyPorn
rch_access: apk,cors
stream_access: apk,cors
rchstreamproxy: web
host: https://familyporn.tv
priorityBrowser: http
streamproxy_preview: true

menu:
  sort:
    Новинки: ""
    Лучшее: top-rated/{page}/

list:
  uri: latest-updates/{page}/

search:
  uri: search/{search}/{page}/

contentParse:
  nodes: //div[@class='thumb-horizontal']
  name:
    node: .//div[@class='description']
  href:
    node: .//a
    attribute: href
  img:
    node: .//img
    attribute: data-webp
  duration:
    node: .//div[@class='duration']
  preview:
    node: .//img
    attribute: data-preview

view:
  related: true
  viewsource: true
  regexMatch:
    matches: ["video_url", "video_alt_url"]
    pattern: "{value}:[\t ]+'([^']+)'"