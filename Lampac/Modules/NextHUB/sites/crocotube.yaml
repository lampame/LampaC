enable: true
displayindex: 408
displayname: CrocoTube
rch_access: apk,cors
stream_access: apk,cors
rchstreamproxy: web
host: https://crocotube.com
priorityBrowser: http
streamproxy_preview: true

menu:
  sort:
    Новинки: ""
    Лучшее: top-rated/{page}/
    Популярнаe: most-popular/{page}/
    Длинные: longest/{page}/
  categories:
    format: categories/{cat}/{page}/
    Model: model
    Sleep: sleep
    Lactating: lactating
    Cucumber: cucumber
    Slap: slap
    Grandpa: grandpa
    Hitchhiker: hitchhiker
    Plumber: plumber
    Bizarre: bizarre
    Wrestling: wrestling
    Balloon: balloon
    Cum: cum

list:
  uri: "{page}/"

search:
  uri: search/{page}/?q={search}

contentParse:
  nodes: //div[@class='thumb']
  name:
    node: .//div[@class='ct-video-thumb-title']
  href:
    node: .//a
    attribute: href
  img:
    node: .//img
    attribute: src
  duration:
    node: .//div[@class='ct-video-thumb-duration']
  preview:
    node: .//a
    attribute: data-preview

view:
  related: true
  viewsource: true
  regexMatch:
    matches: ["1080p", "720p", "360p"]
    pattern: '<source[^\">]+src="(https?://[^/]+/get_file/[^\"]+_{value}.mp4[^"]+)"'